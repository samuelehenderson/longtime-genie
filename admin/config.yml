# =====================================================================
# Decap CMS Configuration for Longtime Genie
# =====================================================================
# This file defines what Sheri can edit through the /admin panel.
# When she saves a change, the CMS commits it to GitHub, which triggers
# Netlify to rebuild the site automatically.

backend:
  name: git-gateway       # Uses Netlify Identity for authentication
  branch: main            # Commits go to the main branch

# Where uploaded images are saved
media_folder: "images/uploads"
public_folder: "/images/uploads"

# Friendly site name shown in the admin
site_url: https://longtime-genie.netlify.app
display_url: https://longtime-genie.netlify.app

# =====================================================================
# COLLECTIONS — what Sheri can edit
# =====================================================================
collections:

  # -------------------------------------------------------------------
  # STORIES — list-based: add/remove/reorder client stories
  # -------------------------------------------------------------------
  - name: "stories_collection"
    label: "📖 Stories"
    files:
      - name: "stories"
        label: "All Stories"
        file: "content/stories.json"
        fields:
          - label: "Stories"
            name: "stories"
            widget: "list"
            label_singular: "Story"
            summary: "{{fields.title}} — {{fields.tag}}"
            fields:
              - { label: "Story Title", name: "title", widget: "string", hint: "The headline shown on the story card" }
              - label: "Category Tag"
                name: "tag"
                widget: "select"
                options:
                  - "Adoption"
                  - "Family Tree"
                  - "DNA Surprise"
                  - "Lost Sibling"
                  - "Generational Healing"
                  - "Donor Conceived"
                  - "Reunion"
                  - "Mystery Solved"
                  - "Other"
                hint: "Pick the tag that best describes this story"
              - { label: "Client Attribution", name: "attribution", widget: "string", hint: "How the client should be credited, e.g. '— Maria T., Tampa, FL'" }
              - { label: "Show on Site?", name: "visible", widget: "boolean", default: true, hint: "Uncheck to hide this story without deleting it" }
              - { label: "Story Text", name: "body", widget: "text", hint: "Keep it to 2-3 sentences for the card view" }

  # -------------------------------------------------------------------
  # TESTIMONIALS — short quotes shown on the stories page
  # -------------------------------------------------------------------
  - name: "testimonials_collection"
    label: "💬 Testimonials"
    files:
      - name: "testimonials"
        label: "All Testimonials"
        file: "content/testimonials.json"
        fields:
          - label: "Testimonials"
            name: "testimonials"
            widget: "list"
            label_singular: "Testimonial"
            summary: "{{fields.name}} — {{fields.location}}"
            fields:
              - { label: "Quote", name: "quote", widget: "text", hint: "What the client said. 1-2 sentences works best." }
              - { label: "Client Name", name: "name", widget: "string", hint: "e.g. 'Maria T.' — first name + last initial is common" }
              - { label: "Location", name: "location", widget: "string", hint: "City, state — e.g. 'Tampa, FL'" }
              - { label: "Show on Site?", name: "visible", widget: "boolean", default: true, hint: "Uncheck to hide without deleting" }

  # -------------------------------------------------------------------
  # SITE SETTINGS — phone, email, social, etc.
  # -------------------------------------------------------------------
  - name: "settings"
    label: "⚙️ Site Settings"
    files:
      - name: "general"
        label: "Contact & Business Info"
        file: "content/settings.json"
        fields:
          - { label: "Business Name", name: "business_name", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string", hint: "Shown next to the logo in the navigation" }
          - { label: "Email Address", name: "email", widget: "string", hint: "Where contact form submissions are emailed" }
          - { label: "Phone Number", name: "phone", widget: "string", hint: "Used for the clickable phone link" }
          - { label: "Phone (Display)", name: "phone_display", widget: "string", hint: "How the phone number is shown on the site" }
          - { label: "Location", name: "location", widget: "string", hint: "City, state — shown on contact page" }
          - { label: "Business Hours", name: "hours", widget: "string" }
          - { label: "Footer Tagline", name: "footer_tagline", widget: "string", hint: "The italic line at the bottom of every page" }
          - { label: "Instagram URL", name: "instagram_url", widget: "string", required: false }
          - { label: "Facebook URL", name: "facebook_url", widget: "string", required: false }
          - { label: "LinkedIn URL", name: "linkedin_url", widget: "string", required: false }
